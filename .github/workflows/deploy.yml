name: Deploy to Keliweb

on:
  push:
    branches:
      - main
    paths:
      - 'immobiliare_sidebar.html'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Keliweb via SFTP
        uses: appleboy/sftp-action@master
        with:
          host: ${{ secrets.SFTP_HOST }}
          port: ${{ secrets.SFTP_PORT }}
          username: ${{ secrets.SFTP_USER }}
          password: ${{ secrets.SFTP_PASSWORD }}
          local_path: ./immobiliare_sidebar.html
          remote_path: /public_html/wp-content/plugins/immobiliare_sidebar.html
          rm: true

      - name: Deployment notification
        run: echo "✅ Deploy completato su Keliweb!"
