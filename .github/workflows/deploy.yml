name: Deploy to Keliweb

on:
  push:
    branches:
      - main
    paths:
      - 'immobiliare_sidebar.html'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Keliweb via SFTP
        run: |
          sudo apt-get update && sudo apt-get install -y lftp
          lftp -e "
            set sftp:auto-confirm yes
            set sftp:connect-program ssh -p ${{ secrets.SFTP_PORT }}
            open sftp://${{ secrets.SFTP_USER }}:${{ secrets.SFTP_PASSWORD }}@${{ secrets.SFTP_HOST }}
            put -e ./immobiliare_sidebar.html /public_html/wp-content/plugins/immobiliare_sidebar.html
            quit
          "

      - name: Deployment notification
        run: echo "✅ Deploy completato su Keliweb!"
